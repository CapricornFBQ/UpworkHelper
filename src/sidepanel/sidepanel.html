<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Opportunity</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body class="sidepanel">
    <header class="toolbar sticky">
      <div>
        <h1>Opportunity</h1>
        <p id="panelStatus">Ready</p>
      </div>
      <button id="refreshButton" class="icon-button" title="Refresh">↻</button>
    </header>

    <main>
      <section class="panel">
        <label for="opportunitySelect">Opportunity</label>
        <select id="opportunitySelect"></select>
        <div class="button-row">
          <button id="captureButton">Capture page</button>
          <button id="scoreButton" class="primary">Score</button>
          <button id="deleteButton" class="danger">Archive</button>
          <button id="permanentDeleteButton" class="danger">Delete permanently</button>
        </div>
      </section>

      <section id="summaryPanel" class="panel"></section>

      <section class="panel">
        <label for="notesInput">Your notes</label>
        <textarea id="notesInput" rows="5" placeholder="Add fit, rate, strategy, or constraints..."></textarea>
        <div class="button-row">
          <button id="saveNotesButton">Save notes</button>
        </div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>Extracted fields</h2>
          <span id="profileReviewBadge" class="badge">Not extracted</span>
        </div>
        <div class="button-row">
          <button id="extractProfileButton">Extract fields</button>
          <button id="saveProfileButton" class="primary">Save corrections</button>
          <button id="clearProfileButton">Clear corrections</button>
        </div>
        <div id="profileFieldsPanel" class="profile-fields empty">No extracted fields.</div>
        <div id="profileConflictsPanel" class="list empty">No conflicts.</div>
      </section>

      <section class="panel">
        <h2>Snapshots</h2>
        <div id="snapshotsList" class="list empty">No snapshots.</div>
      </section>

      <section class="panel">
        <h2>Score details</h2>
        <div id="detailsPanel" class="details empty">No score yet.</div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>Proposal draft</h2>
          <span id="proposalBadge" class="badge">No draft</span>
        </div>
        <div class="button-row">
          <button id="generateProposalButton" class="primary">Generate proposal</button>
          <button id="saveProposalButton">Save edit</button>
          <button id="copyProposalButton">Copy text</button>
          <button id="archiveProposalButton" class="danger">Archive draft</button>
        </div>
        <div id="proposalRiskPanel" class="list empty">No unsupported claims.</div>
        <label for="proposalOutput" class="proposal-output-label">
          Draft text
          <textarea id="proposalOutput" rows="12" placeholder="Generate a proposal after scoring."></textarea>
        </label>
        <div id="proposalDetailsPanel" class="details empty">No proposal metadata.</div>
      </section>
    </main>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
